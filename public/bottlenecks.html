<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bottlenecks</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:16px;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;background:#191919;color:#fff;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);}
body.light{--g:#5C9900;--gm:rgba(92,153,0,.1);--gb:rgba(92,153,0,.2);}

#root{flex:1;overflow-y:auto;padding-right:4px;}
#root::-webkit-scrollbar{width:4px;}
#root::-webkit-scrollbar-track{background:transparent;}
#root::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}
body.light #root::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.1);}
body.light .card{background:#fff;border-color:rgba(0,0,0,.06);}
body.light .card:hover{border-color:rgba(92,153,0,.15);}

/* Top bar */
.top-bar{display:flex;align-items:center;margin-bottom:16px;gap:8px;flex-wrap:wrap;}
.top-right{display:flex;align-items:center;gap:6px;margin-left:auto;}
.eyebrow{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
body.light .eyebrow{color:rgba(0,0,0,.28);}
.h-title{font-size:18px;font-weight:900;letter-spacing:-.03em;color:#fff;}
body.light .h-title{color:#111;}
.ts{font-size:9px;font-weight:500;color:rgba(255,255,255,.18);}
body.light .ts{color:rgba(0,0,0,.22);}
.total-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(239,68,68,.12);color:#F87171;}
.total-badge.none{background:var(--gm);color:var(--g);border:1px solid var(--gb);}

.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 12px;border-radius:7px;cursor:pointer;transition:all .2s;letter-spacing:.2px;}
.btn:hover{border-color:var(--gb);color:var(--g);}
body.light .btn{background:#EFEFEF;border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.4);}
body.light .btn:hover{border-color:var(--gb);color:var(--g);}

/* Summary chips */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:14px;}
.chip{padding:16px 18px;position:relative;overflow:hidden;}
.chip::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .25s;}
.chip:hover::before{opacity:1;}
.chip-dot{position:absolute;top:12px;right:12px;width:6px;height:6px;border-radius:50%;opacity:.6;}

.chip-value{font-size:26px;font-weight:900;letter-spacing:-1.5px;line-height:1;}
.chip-label{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;margin-top:6px;opacity:.7;}

/* Chip color variants — all numbers lime, dots keep accent colors */
.chip-value{color:var(--g);}
.chip-label{color:rgba(255,255,255,.45);}
body.light .chip-label{color:rgba(0,0,0,.4);}
.chip-red .chip-dot,.chip-red::before{background:#F87171;}
.chip-orange .chip-dot,.chip-orange::before{background:#FB923C;}
.chip-yellow .chip-dot,.chip-yellow::before{background:#FBBF24;}
.chip-blue .chip-dot,.chip-blue::before{background:#60A5FA;}
.chip-teal .chip-dot,.chip-teal::before{background:#2DD4BF;}

/* Section cards */
.section-card{padding:20px 22px;margin-bottom:12px;}
.section-hdr{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.section-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.85);}
body.light .section-title{color:rgba(0,0,0,.7);}
.section-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--gm);color:var(--g);border:1px solid var(--gb);margin-left:auto;}

/* Rows */
.row{display:grid;grid-template-columns:3px 1fr auto;gap:0 14px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .1s;border-radius:4px;}
.row:last-child{border-bottom:none;}
.row:hover{background:rgba(170,255,0,.025);}
body.light .row{border-bottom-color:rgba(0,0,0,.04);}
body.light .row:hover{background:rgba(92,153,0,.03);}

.bar{width:3px;border-radius:3px;min-height:36px;align-self:stretch;}
.bar-red{background:#EF4444;} .bar-orange{background:#F97316;} .bar-yellow{background:#EAB308;}
.bar-blue{background:#3B82F6;} .bar-teal{background:#2DD4BF;} .bar-gray{background:#2e2e2e;}

.row-body{min-width:0;}
.row-title{font-size:12.5px;font-weight:700;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
body.light .row-title{color:#222;}
.row-content-name{font-size:10.5px;font-weight:500;color:rgba(255,255,255,.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
body.light .row-content-name{color:rgba(0,0,0,.4);}
.row-meta{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.meta-tag{font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;background:rgba(255,255,255,.05);color:rgba(255,255,255,.3);}
body.light .meta-tag{background:rgba(0,0,0,.04);color:rgba(0,0,0,.35);}

.row-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:80px;}
.badges{display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end;}
.badge{font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:3px 8px;border-radius:5px;white-space:nowrap;}
.badge-overdue{background:rgba(239,68,68,.12);color:#F87171;}
.badge-today{background:rgba(251,146,60,.12);color:#FB923C;}
.badge-revision{background:rgba(234,179,8,.1);color:#EAB308;}
.badge-qc-content{background:rgba(96,165,250,.1);color:#60A5FA;}
.badge-qc-task{background:rgba(45,212,191,.1);color:#2DD4BF;}
body.light .badge-overdue{background:rgba(239,68,68,.08);color:#DC2626;}
body.light .badge-today{background:rgba(249,115,22,.08);color:#EA580C;}
body.light .badge-revision{background:rgba(202,138,4,.08);color:#B45309;}
body.light .badge-qc-content{background:rgba(37,99,235,.08);color:#1D4ED8;}
body.light .badge-qc-task{background:rgba(13,148,136,.08);color:#0F766E;}
.date-text{font-size:9.5px;font-weight:500;color:rgba(255,255,255,.2);}
body.light .date-text{color:rgba(0,0,0,.25);}

.scroll-area{max-height:280px;overflow-y:auto;padding-right:4px;}
.scroll-area::-webkit-scrollbar{width:4px;}
.scroll-area::-webkit-scrollbar-track{background:transparent;}
.scroll-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px;}
body.light .scroll-area::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08);}

/* Empty state */
.empty-card{padding:44px 20px;text-align:center;}
.empty-icon{font-size:28px;margin-bottom:10px;opacity:.7;}
.empty-text{font-size:15px;font-weight:900;color:var(--g);letter-spacing:-.02em;}
.empty-sub{font-size:11px;font-weight:500;color:rgba(255,255,255,.2);margin-top:5px;}
body.light .empty-sub{color:rgba(0,0,0,.28);}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;height:120px;flex-direction:column;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid rgba(170,255,0,.15);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:11px;font-weight:600;color:rgba(255,255,255,.2);}

/* Loading bar */
#lbar{position:fixed;top:0;left:0;right:0;height:2px;z-index:9999;pointer-events:none;background:transparent;}
#lbar.on{background:linear-gradient(90deg,var(--g),rgba(170,255,0,.4));animation:lbar-anim 1.2s ease-in-out infinite;}
@keyframes lbar-anim{0%{opacity:1;transform:scaleX(0);transform-origin:left}60%{opacity:1;transform:scaleX(0.85);transform-origin:left}100%{opacity:0;transform:scaleX(1);transform-origin:left}}

@media(max-width:600px){
  body{padding:10px;}
  .summary{grid-template-columns:repeat(2,1fr);gap:8px;}
  .chip{padding:12px 14px;}
  .chip-value{font-size:22px;}
  .h-title{font-size:15px;}
}
</style>
</head>
<body>
<div id="lbar"></div>
<div id="root"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading...</div></div></div>
<script>
(function(){
  var s=localStorage.getItem('btl-theme');
  if(s==='light')document.body.classList.add('light');
  else if(!s&&window.matchMedia('(prefers-color-scheme: light)').matches)document.body.classList.add('light');
})();

var _data=null;
function esc(s){if(!s)return'';return(''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){if(!d)return'';var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];var p=d.split('-');return mo[parseInt(p[1])-1]+' '+parseInt(p[2]);}

function barClass(r){
  if(r.includes('Overdue'))return'bar-red';
  if(r.includes('Due Today'))return'bar-orange';
  if(r.includes('Revision'))return'bar-yellow';
  if(r.includes('QC Review'))return'bar-blue';
  if(r.includes('Pending QC'))return'bar-teal';
  return'bar-gray';
}

function renderBadges(item){
  var h='';
  if(item.reasons.includes('Overdue'))h+='<span class="badge badge-overdue">'+(item.daysOverdue>0?item.daysOverdue+'d late':'Overdue')+'</span>';
  if(item.reasons.includes('Due Today'))h+='<span class="badge badge-today">Due Today</span>';
  if(item.reasons.includes('Revision'))h+='<span class="badge badge-revision">Revision</span>';
  if(item.reasons.includes('QC Review'))h+='<span class="badge badge-qc-content">Content QC</span>';
  if(item.reasons.includes('Pending QC'))h+='<span class="badge badge-qc-task">Task QC</span>';
  return h;
}

function renderRow(item){
  var bar=barClass(item.reasons);
  var meta='';
  if(item.client)meta+='<span class="meta-tag">'+esc(item.client)+'</span>';
  if(item.channel&&item.channel.length)meta+='<span class="meta-tag">'+esc(item.channel.join(' · '))+'</span>';
  if(item.type&&item.type.length)meta+='<span class="meta-tag">'+esc(item.type.join(', '))+'</span>';
  if(item.campaign)meta+='<span class="meta-tag">'+esc(item.campaign)+'</span>';
  if(item.people&&item.people.length)meta+='<span class="meta-tag">'+esc(item.people.join(', '))+'</span>';
  var dateStr=item.deadline?fmtDate(item.deadline):'';
  var url=item.url?(item.url.replace(/'/g,"\\'")):'' ;
  var contentLine=item.contentName?'<div class="row-content-name">'+esc(item.contentName)+'</div>':'';
  return '<div class="row" onclick="openUrl(\''+url+'\')">'
    +'<div class="bar '+bar+'"></div>'
    +'<div class="row-body"><div class="row-title">'+esc(item.title)+'</div>'+contentLine+(meta?'<div class="row-meta">'+meta+'</div>':'')+'</div>'
    +'<div class="row-right"><div class="badges">'+renderBadges(item)+'</div>'+(dateStr?'<div class="date-text">'+dateStr+'</div>':'')+'</div>'
    +'</div>';
}

function render(data){
  var isLight=document.body.classList.contains('light');
  var total=data.total||0;

  var html='<div class="top-bar">'
    +'<div><p class="eyebrow">Opxio &middot; Ops</p><h1 class="h-title">Bottlenecks</h1></div>'
    +'<div class="top-right">'
    +(total>0?'<span class="total-badge">'+total+'</span>':'<span class="total-badge none">All clear</span>')
    +'<span class="ts" id="ts"></span>'
    +'<button class="btn" onclick="toggleMode()" id="lbtn">'+(isLight?'☾ Dark':'☀ Light')+'</button>'
    +'<button class="btn" onclick="loadData()" id="rbtn">↻ Refresh</button>'
    +'</div></div>';

  if(total===0){
    html+='<div class="empty-card card"><div class="empty-icon">✓</div><div class="empty-text">No bottlenecks</div><div class="empty-sub">Everything is on track</div></div>';
    document.getElementById('root').innerHTML=html;updateTs();return;
  }

  // Summary chips
  var chips=[];
  if(data.overdue>0)chips.push({v:data.overdue,l:'Overdue',c:'chip-red'});
  if(data.dueToday>0)chips.push({v:data.dueToday,l:'Due Today',c:'chip-orange'});
  if(data.revisions>0)chips.push({v:data.revisions,l:'Revision',c:'chip-yellow'});
  if(data.contentQC>0)chips.push({v:data.contentQC,l:'Final QC',c:'chip-blue'});
  if(data.taskQC>0)chips.push({v:data.taskQC,l:'Task QC',c:'chip-teal'});

  if(chips.length){
    html+='<div class="summary">';
    for(var i=0;i<chips.length;i++){
      html+='<div class="chip card '+chips[i].c+'">'
        +'<div class="chip-dot"></div>'
        +'<div class="chip-value">'+chips[i].v+'</div>'
        +'<div class="chip-label">'+chips[i].l+'</div>'
        +'</div>';
    }
    html+='</div>';
  }

  // Content section
  if(data.content&&data.content.length){
    html+='<div class="section-card card">'
      +'<div class="section-hdr"><span class="section-title">Content</span><span class="section-badge">'+data.content.length+'</span></div>'
      +'<div class="scroll-area">';
    data.content.forEach(function(item){html+=renderRow(item);});
    html+='</div></div>';
  }

  // Tasks section
  if(data.tasks&&data.tasks.length){
    html+='<div class="section-card card">'
      +'<div class="section-hdr"><span class="section-title">Tasks · QC</span><span class="section-badge">'+data.tasks.length+'</span></div>'
      +'<div class="scroll-area">';
    data.tasks.forEach(function(item){html+=renderRow(item);});
    html+='</div></div>';
  }

  document.getElementById('root').innerHTML=html;
  updateTs();
}

function updateTs(){var el=document.getElementById('ts');if(!el)return;var n=new Date();var h=n.getHours(),m=n.getMinutes();el.textContent=(h%12||12)+':'+(m<10?'0':'')+m+(h<12?' am':' pm');}
window.openUrl=function(url){if(url)window.open(url,'_blank');};
window.toggleMode=function(){var l=document.body.classList.toggle('light');localStorage.setItem('btl-theme',l?'light':'dark');if(_data)render(_data);};

function _lbarOn(){var b=document.getElementById('lbar');if(b)b.classList.add('on');}
function _lbarOff(){var b=document.getElementById('lbar');if(b)b.classList.remove('on');}

async function loadData(){
  _lbarOn();
  var btn=document.getElementById('rbtn');if(btn){btn.disabled=true;btn.textContent='Loading...';}
  try{
    if(!_data){try{var c=JSON.parse(localStorage.getItem('btl-cache'));if(c){render(c);}}catch(e){}}
    var res=await fetch('/api/bottlenecks');
    if(!res.ok)throw new Error('API error '+res.status);
    _data=await res.json();
    try{localStorage.setItem('btl-cache',JSON.stringify(_data));}catch(e){}
    _lbarOff();
    render(_data);
  }catch(err){
    _lbarOff();
    if(!_data)document.getElementById('root').innerHTML='<div class="loading"><div style="font-size:12px;color:#F87171;font-weight:700;">Failed to load</div><div style="font-size:10px;color:rgba(255,255,255,.2);margin-top:6px;">'+esc(err.message)+'</div></div>';
  }finally{
    var b=document.getElementById('rbtn');if(b){b.disabled=false;b.textContent='↻ Refresh';}
  }
}
loadData();
setInterval(loadData,600000);
</script>
</body>
</html>
