<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign Stats</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:16px;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased;background:#191919;color:#fff;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);}
body.light{--g:#5C9900;--gm:rgba(92,153,0,.1);--gb:rgba(92,153,0,.2);}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.1);}
body.light .card{background:#fff;border-color:rgba(0,0,0,.06);}
body.light .card:hover{border-color:rgba(92,153,0,.15);}

/* Top bar */
.top-bar{display:flex;align-items:flex-end;margin-bottom:16px;gap:8px;flex-wrap:wrap;}
.top-right{display:flex;align-items:center;gap:6px;margin-left:auto;}
.eyebrow{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
body.light .eyebrow{color:rgba(0,0,0,.28);}
.h-title{font-size:18px;font-weight:900;letter-spacing:-.03em;color:#fff;}
body.light .h-title{color:#111;}
.ts{font-size:9px;font-weight:500;color:rgba(255,255,255,.18);}
body.light .ts{color:rgba(0,0,0,.22);}

.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 12px;border-radius:7px;cursor:pointer;transition:all .2s;letter-spacing:.2px;}
.btn:hover{border-color:var(--gb);color:var(--g);}
body.light .btn{background:#EFEFEF;border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.4);}
body.light .btn:hover{border-color:var(--gb);color:var(--g);}

/* Stat cards */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;}
.stat{padding:18px 18px 16px;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .25s;}
.stat:hover::before{opacity:1;}
.s-dot{position:absolute;top:14px;right:14px;width:6px;height:6px;border-radius:50%;opacity:.6;}
.s-lbl{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px;line-height:1.4;}
.s-val{font-size:28px;font-weight:900;letter-spacing:-1.5px;line-height:1;}
.s-sub{font-size:10px;font-weight:500;color:rgba(255,255,255,.22);margin-top:7px;}
body.light .s-sub{color:rgba(0,0,0,.3);}

/* Stat color variants — all numbers lime green, dots keep accent colors */
.s-lbl{color:rgba(255,255,255,.85);}
.s-val{color:var(--g);}
.sc-lime .s-dot,.sc-lime::before{background:var(--g);}
.sc-blue .s-dot,.sc-blue::before{background:#60A5FA;}
.sc-amber .s-dot,.sc-amber::before{background:#FBBF24;}
.sc-green .s-dot,.sc-green::before{background:#34D399;}
.sc-teal .s-dot,.sc-teal::before{background:#2DD4BF;}
.sc-red .s-dot,.sc-red::before{background:#F87171;}
.sc-purple .s-dot,.sc-purple::before{background:#A78BFA;}

body.light .s-lbl{color:rgba(0,0,0,.8);}
body.light .s-val{color:var(--g);}

/* 2-col grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}

/* Panel */
.panel{padding:20px 22px;}
.panel-hdr{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.panel-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.85);}
body.light .panel-title{color:rgba(0,0,0,.7);}
.panel-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--gm);color:var(--g);border:1px solid var(--gb);margin-left:auto;}

/* Progress bars */
.prog-row{margin-bottom:13px;}
.prog-row:last-child{margin-bottom:0;}
.prog-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.prog-label{font-size:11.5px;font-weight:600;color:rgba(255,255,255,.6);}
body.light .prog-label{color:rgba(0,0,0,.55);}
.prog-count{font-size:12px;font-weight:700;color:#fff;}
body.light .prog-count{color:#111;}
.prog-bar{background:rgba(255,255,255,.06);border-radius:4px;height:7px;overflow:hidden;}
body.light .prog-bar{background:rgba(0,0,0,.07);}
.prog-fill{height:100%;border-radius:4px;transition:width .45s cubic-bezier(.4,0,.2,1);}
.prog-sub{font-size:9.5px;font-weight:500;color:rgba(255,255,255,.25);margin-top:4px;}
body.light .prog-sub{color:rgba(0,0,0,.3);}
.prog-sub.done{color:var(--g);}

/* Campaign list */
.camp-scroll{max-height:240px;overflow-y:auto;padding-right:4px;}
.camp-scroll::-webkit-scrollbar{width:4px;}
.camp-scroll::-webkit-scrollbar-track{background:transparent;}
.camp-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px;}
body.light .camp-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08);}

.camp-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:default;}
.camp-item:last-child{border-bottom:none;}
body.light .camp-item{border-bottom-color:rgba(0,0,0,.05);}
.camp-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.8);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
body.light .camp-name{color:#222;}
.camp-type{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.3);white-space:nowrap;}
body.light .camp-type{background:rgba(0,0,0,.05);color:rgba(0,0,0,.4);}
.camp-bar-wrap{width:56px;flex-shrink:0;}
.camp-bar{background:rgba(255,255,255,.06);border-radius:3px;height:5px;overflow:hidden;}
body.light .camp-bar{background:rgba(0,0,0,.07);}
.camp-bar-fill{height:100%;border-radius:3px;transition:width .4s ease;}
.camp-pct{font-size:12px;font-weight:900;min-width:36px;text-align:right;}

.empty-msg{font-size:12px;font-weight:500;color:rgba(255,255,255,.2);padding:10px 0;}
body.light .empty-msg{color:rgba(0,0,0,.3);}

/* Task section */
.task-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.task-mini{padding:16px 18px;position:relative;overflow:hidden;}
.task-mini::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .25s;}
.task-mini:hover::before{opacity:1;}
.tm-dot{position:absolute;top:12px;right:12px;width:6px;height:6px;border-radius:50%;opacity:.6;}
.tm-value{font-size:26px;font-weight:900;letter-spacing:-1.5px;line-height:1;}
.tm-label{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-top:6px;opacity:.75;}

/* Task mini — all numbers lime */
.tm-value{color:var(--g) !important;}
.tm-label{color:rgba(255,255,255,.5) !important;}
body.light .tm-label{color:rgba(0,0,0,.4) !important;}

/* Task status rows */
.ts-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.ts-row:last-child{border-bottom:none;}
body.light .ts-row{border-bottom-color:rgba(0,0,0,.05);}
.ts-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ts-label{font-size:12px;font-weight:500;color:rgba(255,255,255,.55);flex:1;}
body.light .ts-label{color:rgba(0,0,0,.5);}
.ts-bar-wrap{width:50px;flex-shrink:0;}
.ts-bar{background:rgba(255,255,255,.06);border-radius:3px;height:5px;overflow:hidden;}
body.light .ts-bar{background:rgba(0,0,0,.07);}
.ts-bar-fill{height:100%;border-radius:3px;}
.ts-count{font-size:13px;font-weight:900;min-width:22px;text-align:right;color:var(--g);}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;height:120px;flex-direction:column;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid rgba(170,255,0,.15);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:11px;font-weight:600;color:rgba(255,255,255,.2);}

/* Loading bar */
#lbar{position:fixed;top:0;left:0;right:0;height:2px;z-index:9999;pointer-events:none;background:transparent;}
#lbar.on{background:linear-gradient(90deg,var(--g),rgba(170,255,0,.4));animation:lbar-anim 1.2s ease-in-out infinite;}
@keyframes lbar-anim{0%{opacity:1;transform:scaleX(0);transform-origin:left}60%{opacity:1;transform:scaleX(0.85);transform-origin:left}100%{opacity:0;transform:scaleX(1);transform-origin:left}}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}
body.light ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);}

@media(max-width:768px){
  body{padding:10px;}
  .stat-row{grid-template-columns:repeat(2,1fr);}
  .grid-2{grid-template-columns:1fr;}
  .task-grid{grid-template-columns:repeat(3,1fr);}
}
@media(max-width:480px){
  .stat-row{grid-template-columns:repeat(2,1fr);gap:8px;}
  .s-val{font-size:22px;}
  .task-grid{grid-template-columns:repeat(3,1fr);gap:8px;}
  .tm-value{font-size:20px;}
}
</style>
</head>
<body>
<div id="lbar"></div>
<div id="dashboard">
  <div class="loading"><div class="spinner"></div><div class="loading-text">Loading stats...</div></div>
</div>
<script>
(function(){try{if(localStorage.getItem('campaign-stats-theme')==='light')document.body.classList.add('light');}catch(e){}})();

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

var PROG_COLORS={videos:'#60A5FA',posters:'#A78BFA',live:'#F472B6',kol:'#2DD4BF'};

function pctColor(pct){return'var(--g)';}

function updateTs(){var el=document.getElementById('ts');if(!el)return;var n=new Date();var h=n.getHours(),m=n.getMinutes();el.textContent=(h%12||12)+':'+(m<10?'0':'')+m+(h<12?' am':' pm');}

function render(s,taskData){
  var isLight=document.body.classList.contains('light');
  var remaining=s.remainingDeliverables||0;
  var cb=s.contentBreakdown||{};
  var t=taskData||{};
  var tb=t.tasksBreakdown||{};
  var ab=t.attentionBreakdown||{};

  var html='<div class="top-bar">'
    +'<div><p class="eyebrow">Opxio &middot; Marketing OS</p><h1 class="h-title">Campaign Stats</h1></div>'
    +'<div class="top-right">'
    +'<span class="ts" id="ts"></span>'
    +'<button class="btn" onclick="toggleMode()">'+(isLight?'☾ Dark':'☀ Light')+'</button>'
    +'<button class="btn" onclick="loadData()">↻ Refresh</button>'
    +'</div></div>';

  // Stat cards
  html+='<div class="stat-row">'
    +'<div class="stat card sc-lime"><div class="s-dot"></div><div class="s-lbl">Active Campaigns</div><div class="s-val">'+s.activeCampaigns+'</div><div class="s-sub">Currently running</div></div>'
    +'<div class="stat card sc-blue"><div class="s-dot"></div><div class="s-lbl">Content In Motion</div><div class="s-val">'+(t.contentInMotion||0)+'</div><div class="s-sub">Videos · Posters · Live · KOL</div></div>'
    +'<div class="stat card sc-teal"><div class="s-dot"></div><div class="s-lbl">Completed</div><div class="s-val">'+s.completedDeliverables+'</div><div class="s-sub">'+remaining+' remaining</div></div>'
    +'<div class="stat card sc-purple"><div class="s-dot"></div><div class="s-lbl">Avg Completion</div><div class="s-val">'+s.avgCompletion+'%</div><div class="s-sub">Across active campaigns</div></div>'
    +'</div>';

  // 2-col detail
  html+='<div class="grid-2">';

  // Content Breakdown
  html+='<div class="panel card"><div class="panel-hdr"><span class="panel-title">Content Breakdown</span></div>';
  var types=[
    {key:'videos',label:'Videos',color:PROG_COLORS.videos},
    {key:'posters',label:'Posters',color:PROG_COLORS.posters},
    {key:'live',label:'Live Sessions',color:PROG_COLORS.live},
    {key:'kol',label:'KOL Posts',color:PROG_COLORS.kol},
  ];
  for(var i=0;i<types.length;i++){
    var tp=types[i];
    var d=cb[tp.key]||{planned:0,completed:0};
    var pct=d.planned>0?Math.round((d.completed/d.planned)*100):0;
    var rem=d.planned-d.completed;
    html+='<div class="prog-row">'
      +'<div class="prog-header"><span class="prog-label">'+tp.label+'</span><span class="prog-count">'+d.completed+' / '+d.planned+'</span></div>'
      +'<div class="prog-bar"><div class="prog-fill" style="width:'+Math.max(pct>0?4:0,pct)+'%;background:'+tp.color+';"></div></div>'
      +(rem>0?'<div class="prog-sub">'+rem+' remaining</div>':'<div class="prog-sub done">All done</div>')
      +'</div>';
  }
  html+='</div>';

  // Campaign Progress
  var campCount=s.campaignDetails?s.campaignDetails.length:0;
  html+='<div class="panel card"><div class="panel-hdr"><span class="panel-title">Campaign Progress</span>'+(campCount>0?'<span class="panel-badge">'+campCount+'</span>':'')+'</div>';
  if(s.campaignDetails&&s.campaignDetails.length>0){
    html+='<div class="camp-scroll">';
    for(var j=0;j<s.campaignDetails.length;j++){
      var c=s.campaignDetails[j];
      var col=pctColor(c.pct);
      html+='<div class="camp-item">'
        +'<span class="camp-name" title="'+esc(c.name)+'">'+esc(c.name)+'</span>'
        +'<span class="camp-type">'+esc(c.type)+'</span>'
        +'<div class="camp-bar-wrap"><div class="camp-bar"><div class="camp-bar-fill" style="width:'+Math.max(c.pct>0?5:0,c.pct)+'%;background:'+col+';"></div></div></div>'
        +'<span class="camp-pct" style="color:'+col+';">'+c.pct+'%</span>'
        +'</div>';
    }
    html+='</div>';
  }else{
    html+='<div class="empty-msg">No active campaigns</div>';
  }
  html+='</div>';
  html+='</div>'; // end grid-2

  // Task Tracker
  if(taskData){
    var totalTasks=t.tasksTotal||0;
    var overdue=ab.overdue||0;
    var dueWeek=t.dueThisWeek||0;
    html+='<div class="task-grid">'
      +'<div class="task-mini card sc-purple"><div class="tm-dot" style="background:#A78BFA;opacity:.6;"></div><div class="tm-value">'+totalTasks+'</div><div class="tm-label">Active Tasks</div></div>'
      +'<div class="task-mini card sc-blue"><div class="tm-dot" style="background:#60A5FA;opacity:.6;"></div><div class="tm-value">'+dueWeek+'</div><div class="tm-label">Due This Week</div></div>'
      +'<div class="task-mini card sc-teal"><div class="tm-dot" style="background:#2DD4BF;opacity:.6;"></div><div class="tm-value">'+overdue+'</div><div class="tm-label">'+(overdue>0?'Overdue':'On Track')+'</div></div>'
      +'</div>';

    var statuses=[
      {label:'In Progress',count:tb.inProgress||0,color:'#60A5FA'},
      {label:'Waiting',count:tb.waiting||0,color:'#FBBF24'},
      {label:'QC Review',count:tb.qc||0,color:'#A78BFA'},
      {label:'Revision Needed',count:tb.revision||0,color:'#F87171'},
    ];
    html+='<div class="panel card"><div class="panel-hdr"><span class="panel-title">Task Status Breakdown</span><span class="panel-badge">'+totalTasks+'</span></div>';
    for(var k=0;k<statuses.length;k++){
      var st=statuses[k];
      var barPct=totalTasks>0?Math.round((st.count/totalTasks)*100):0;
      html+='<div class="ts-row">'
        +'<div class="ts-dot" style="background:'+st.color+';"></div>'
        +'<span class="ts-label">'+st.label+'</span>'
        +'<div class="ts-bar-wrap"><div class="ts-bar"><div class="ts-bar-fill" style="width:'+Math.max(barPct>0?8:0,barPct)+'%;background:'+st.color+';"></div></div></div>'
        +'<span class="ts-count">'+st.count+'</span>'
        +'</div>';
    }
    html+='</div>';
  }

  document.getElementById('dashboard').innerHTML=html;
  updateTs();
}

var _lastData=null,_taskData=null;
function _lbarOn(){var b=document.getElementById('lbar');if(b)b.classList.add('on');}
function _lbarOff(){var b=document.getElementById('lbar');if(b)b.classList.remove('on');}

async function loadData(){
  _lbarOn();
  try{
    var [campRes,taskRes]=await Promise.all([
      fetch('/api/campaign-stats'),
      fetch('/api/content-stats').catch(function(){return null;})
    ]);
    if(!campRes.ok)throw new Error('API error '+campRes.status);
    _lastData=await campRes.json();
    if(taskRes&&taskRes.ok)_taskData=await taskRes.json();
    _lbarOff();
    render(_lastData,_taskData);
  }catch(err){
    _lbarOff();
    document.getElementById('dashboard').innerHTML='<div class="loading"><div style="font-size:12px;color:#F87171;font-weight:700;">Failed to load</div><div style="font-size:10px;color:rgba(255,255,255,.2);margin-top:6px;">'+esc(err.message)+'</div></div>';
  }
}

window.toggleMode=function(){
  var l=document.body.classList.toggle('light');
  try{localStorage.setItem('campaign-stats-theme',l?'light':'dark');}catch(e){}
  if(_lastData){render(_lastData,_taskData);}
};

loadData();
setInterval(loadData,600000);
</script>
</body>
</html>
